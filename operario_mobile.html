<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGT-Ganadero - Operario</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-ganadero-dark { background-color: #0d3b2e; }
        .text-ganadero-dark { color: #0d3b2e; }
    </style>
</head>
<body class="bg-gray-100 font-sans flex justify-center">

    <div class="w-full max-w-md bg-ganadero-dark h-screen shadow-2xl flex flex-col relative overflow-hidden text-white">
        
        <header class="p-6 flex justify-between items-center border-b border-white/10">
            <div>
                <h1 class="text-xl font-bold">SGT-Ganadero</h1>
                <p class="text-xs text-green-300 uppercase tracking-widest font-bold mt-1">Operador de Campo</p>
            </div>
            <button onclick="window.location.href='index.html'" class="bg-white/10 p-2 rounded-full hover:bg-white/20 transition-colors" title="Cerrar sesión">
                🚪
            </button>
        </header>

        <main class="flex-1 p-6 overflow-auto">
            <h2 class="text-2xl font-bold mb-6">Panel de Control</h2>
            
            <div class="grid grid-cols-2 gap-4 mb-8">
                <button class="bg-white/10 border border-white/20 rounded-2xl p-6 flex flex-col items-center justify-center gap-3 hover:bg-white/20 active:bg-white/30 transition-colors">
                    <span class="text-4xl">🐾</span>
                    <span class="font-bold text-sm tracking-wide">Hacienda</span>
                </button>
                <button class="bg-white/10 border border-white/20 rounded-2xl p-6 flex flex-col items-center justify-center gap-3 hover:bg-white/20 active:bg-white/30 transition-colors">
                    <span class="text-4xl">📍</span>
                    <span class="font-bold text-sm tracking-wide">Parcelas</span>
                </button>
                <button class="bg-white/10 border border-white/20 rounded-2xl p-6 flex flex-col items-center justify-center gap-3 hover:bg-white/20 active:bg-white/30 transition-colors">
                    <span class="text-4xl">⚕️</span>
                    <span class="font-bold text-sm tracking-wide">Sanidad</span>
                </button>
                <button class="bg-blue-500 rounded-2xl p-6 flex flex-col items-center justify-center gap-3 shadow-lg active:bg-blue-600 transition-colors border border-blue-400">
                    <span class="text-4xl text-white">⚖️</span>
                    <span class="font-bold text-sm text-white tracking-wide text-center">Registrar Pesaje</span>
                </button>
            </div>

            <div class="bg-white/5 border border-white/10 rounded-xl p-4">
                <div class="flex justify-between items-end mb-4 border-b border-white/10 pb-2">
                    <span class="text-xs text-gray-400 font-bold uppercase tracking-wider">Actividad Offline</span>
                    <span class="text-xs text-gray-400">Estado</span>
                </div>
                <div class="space-y-4 mb-6">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <span class="text-gray-400">⚖️</span>
                            <div>
                                <p class="text-sm font-bold text-white">Pesaje Lote A4</p>
                                <p class="text-xs text-gray-400">Hace 2 horas</p>
                            </div>
                        </div>
                        <span class="text-sm font-bold text-green-400">Guardado Local</span>
                    </div>
                </div>
                
                <button class="w-full bg-white text-ganadero-dark font-bold py-4 rounded-xl shadow-md active:bg-gray-200 transition-colors flex justify-center items-center gap-2">
                    <span>🔄</span> FORZAR SINCRONIZACIÓN
                </button>
            </div>
        </main>
    </div>
</body>
</html>
