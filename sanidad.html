<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGT-Ganadero - Sanidad Animal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-ganadero-dark { background-color: #0d3b2e; }
        .text-ganadero-dark { color: #0d3b2e; }
        .active-nav { background-color: #165c48; }
    </style>
</head>
<body class="bg-gray-50 h-screen flex font-sans">

    <aside class="w-64 bg-ganadero-dark text-white flex flex-col shadow-lg z-10 flex-shrink-0">
        <div class="p-6"><h2 class="text-2xl font-bold tracking-wider">SGT-Ganadero</h2></div>
        <nav class="flex-1 px-4 space-y-2 mt-4">
            <a href="dashboard_admin.html" class="flex items-center gap-3 px-4 py-3 hover:bg-white/10 rounded-lg text-sm transition-colors text-gray-300"><span>🐾</span> Hacienda</a>
            <a href="parcelas.html" class="flex items-center gap-3 px-4 py-3 hover:bg-white/10 rounded-lg text-sm transition-colors text-gray-300"><span>📍</span> Parcelas</a>
            <a href="sanidad.html" class="flex items-center gap-3 px-4 py-3 active-nav rounded-lg text-sm font-medium transition-colors"><span>⚕️</span> Sanidad</a>
        </nav>
        <div class="p-4 border-t border-white/10">
            <button onclick="window.location.href='index.html'" class="w-full flex items-center gap-3 px-4 py-2 hover:bg-red-500/20 text-gray-300 rounded-lg text-sm text-left">🚪 Cerrar Sesión</button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white border-b border-gray-200 h-16 flex items-center justify-between px-8 shadow-sm">
            <h1 class="font-bold text-gray-800 text-lg">Sanidad Animal</h1>
        </header>

        <div class="flex-1 overflow-auto p-8">
            <div class="border-b border-gray-200 mb-6 flex gap-8 text-sm font-medium">
                <button class="pb-3 border-b-2 border-ganadero-dark text-ganadero-dark">Registrar Tratamiento</button>
                <button class="pb-3 text-gray-500 hover:text-gray-800 transition-colors">Registrar Vacunación</button>
                <button class="pb-3 text-gray-500 hover:text-gray-800 transition-colors">Consultar Historial</button>
            </div>

            <div class="bg-white rounded-lg shadow-sm border border-gray-100 p-8 max-w-3xl">
                <div class="grid grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Seleccionar Animales</label>
                        <input type="text" placeholder="ID o nombre del animal..." class="w-full border border-gray-300 rounded p-2 text-sm outline-none focus:border-green-700">
                        <div class="mt-2 flex gap-2">
                            <span class="bg-green-100 text-green-800 text-xs px-2 py-1 rounded flex items-center gap-1">V-098 <button>×</button></span>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Fecha de Inicio</label>
                        <input type="date" class="w-full border border-gray-300 rounded p-2 text-sm outline-none focus:border-green-700">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Tipo de Tratamiento</label>
                        <input type="text" placeholder="Ej: Desparasitación" class="w-full border border-gray-300 rounded p-2 text-sm outline-none focus:border-green-700">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Producto / Medicamento</label>
                        <input type="text" placeholder="Nombre del fármaco" class="w-full border border-gray-300 rounded p-2 text-sm outline-none focus:border-green-700">
                    </div>
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-bold text-gray-700 mb-2">Notas Adicionales</label>
                    <textarea rows="3" placeholder="Observaciones técnicas o dosis específica..." class="w-full border border-gray-300 rounded p-2 text-sm outline-none focus:border-green-700"></textarea>
                </div>
                <div class="flex justify-end gap-4">
                    <button class="px-6 py-2 border border-gray-300 text-gray-700 rounded text-sm font-medium hover:bg-gray-50">Cancelar</button>
                    <button class="px-6 py-2 bg-ganadero-dark text-white rounded text-sm font-medium hover:bg-green-800" onclick="alert('Tratamiento Registrado')">Guardar Tratamiento</button>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
